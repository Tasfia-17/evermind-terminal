<svg width="760" height="180" viewBox="0 0 760 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1a4e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2a3e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="card3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a3a2e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#7c3aed" flood-opacity="0.2"/>
    </filter>
  </defs>
  <rect width="760" height="180" fill="#0d0d1a" rx="16"/>

  <!-- Card 1 -->
  <rect x="20" y="20" width="220" height="140" rx="14" fill="url(#card1)" stroke="#7c3aed" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="36" y="36" width="40" height="40" rx="10" fill="#7c3aed" opacity="0.25"/>
  <text x="56" y="63" text-anchor="middle" font-size="22" font-family="serif">🔍</text>
  <text x="130" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#e0d7ff" font-family="sans-serif">Context Loss</text>
  <text x="130" y="118" text-anchor="middle" font-size="10.5" fill="#9399b2" font-family="sans-serif">Every session starts</text>
  <text x="130" y="133" text-anchor="middle" font-size="10.5" fill="#9399b2" font-family="sans-serif">from a blank slate.</text>
  <text x="130" y="150" text-anchor="middle" font-size="10" fill="#f38ba8" font-family="monospace">bash_history = noise</text>

  <!-- Card 2 -->
  <rect x="270" y="20" width="220" height="140" rx="14" fill="url(#card2)" stroke="#f59e0b" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="286" y="36" width="40" height="40" rx="10" fill="#f59e0b" opacity="0.25"/>
  <text x="306" y="63" text-anchor="middle" font-size="22" font-family="serif">⚡</text>
  <text x="380" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#fef3c7" font-family="sans-serif">Repeated Errors</text>
  <text x="380" y="118" text-anchor="middle" font-size="10.5" fill="#9399b2" font-family="sans-serif">Same bugs debugged</text>
  <text x="380" y="133" text-anchor="middle" font-size="10.5" fill="#9399b2" font-family="sans-serif">over and over again.</text>
  <text x="380" y="150" text-anchor="middle" font-size="10" fill="#f38ba8" font-family="monospace">hours wasted</text>

  <!-- Card 3 -->
  <rect x="520" y="20" width="220" height="140" rx="14" fill="url(#card3)" stroke="#06b6d4" stroke-width="1.5" filter="url(#shadow)"/>
  <rect x="536" y="36" width="40" height="40" rx="10" fill="#06b6d4" opacity="0.25"/>
  <text x="556" y="63" text-anchor="middle" font-size="22" font-family="serif">👥</text>
  <text x="630" y="100" text-anchor="middle" font-size="13" font-weight="bold" fill="#cffafe" font-family="sans-serif">Onboarding Pain</text>
  <text x="630" y="118" text-anchor="middle" font-size="10.5" fill="#9399b2" font-family="sans-serif">Tribal knowledge locked</text>
  <text x="630" y="133" text-anchor="middle" font-size="10.5" fill="#9399b2" font-family="sans-serif">in someone's head.</text>
  <text x="630" y="150" text-anchor="middle" font-size="10" fill="#f38ba8" font-family="monospace">days lost onboarding</text>
</svg>
