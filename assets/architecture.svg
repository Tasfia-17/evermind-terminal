<svg width="760" height="260" viewBox="0 0 760 260" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#6c7086"/>
    </marker>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="760" height="260" fill="#0d0d1a" rx="16"/>

  <!-- Title -->
  <text x="380" y="30" text-anchor="middle" font-size="13" fill="#6c7086" font-family="monospace">Retrieve  →  Reason  →  Execute  →  Remember</text>

  <!-- Flow nodes (horizontal) -->
  <!-- Node 1 -->
  <rect x="30" y="60" width="130" height="50" rx="10" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1.8"/>
  <text x="95" y="81" text-anchor="middle" font-size="9" fill="#7c3aed" font-family="monospace" font-weight="bold">1. USER INPUT</text>
  <text x="95" y="97" text-anchor="middle" font-size="8" fill="#9399b2" font-family="sans-serif">natural language</text>

  <!-- Arrow -->
  <line x1="160" y1="85" x2="188" y2="85" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 2 -->
  <rect x="190" y="60" width="130" height="50" rx="10" fill="#1e1e2e" stroke="#06b6d4" stroke-width="1.8"/>
  <text x="255" y="81" text-anchor="middle" font-size="9" fill="#06b6d4" font-family="monospace" font-weight="bold">2. RETRIEVAL</text>
  <text x="255" y="97" text-anchor="middle" font-size="8" fill="#9399b2" font-family="sans-serif">semantic search</text>

  <!-- Arrow -->
  <line x1="320" y1="85" x2="348" y2="85" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 3 -->
  <rect x="350" y="60" width="130" height="50" rx="10" fill="#1e1e2e" stroke="#a855f7" stroke-width="1.8"/>
  <text x="415" y="81" text-anchor="middle" font-size="9" fill="#a855f7" font-family="monospace" font-weight="bold">3. GENERATION</text>
  <text x="415" y="97" text-anchor="middle" font-size="8" fill="#9399b2" font-family="sans-serif">Gemini + memories</text>

  <!-- Arrow -->
  <line x1="480" y1="85" x2="508" y2="85" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 4 -->
  <rect x="510" y="60" width="130" height="50" rx="10" fill="#1e1e2e" stroke="#10b981" stroke-width="1.8"/>
  <text x="575" y="81" text-anchor="middle" font-size="9" fill="#10b981" font-family="monospace" font-weight="bold">4. EXECUTION</text>
  <text x="575" y="97" text-anchor="middle" font-size="8" fill="#9399b2" font-family="sans-serif">subprocess worker</text>

  <!-- Arrow down from node 4 -->
  <line x1="575" y1="110" x2="575" y2="138" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Node 5 -->
  <rect x="510" y="140" width="130" height="50" rx="10" fill="#1e1e2e" stroke="#f59e0b" stroke-width="1.8"/>
  <text x="575" y="161" text-anchor="middle" font-size="9" fill="#f59e0b" font-family="monospace" font-weight="bold">5. MEMORY STORE</text>
  <text x="575" y="177" text-anchor="middle" font-size="8" fill="#9399b2" font-family="sans-serif">result → EverMemOS</text>

  <!-- Arrow left from node 5 back to node 2 (loop) -->
  <path d="M510,165 Q380,230 255,165" fill="none" stroke="#7c3aed" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)" opacity="0.7"/>
  <text x="380" y="225" text-anchor="middle" font-size="8" fill="#7c3aed" font-family="monospace" opacity="0.9">memory loop</text>

  <!-- EverMemOS box -->
  <rect x="30" y="140" width="440" height="90" rx="12" fill="#12122a" stroke="#7c3aed" stroke-width="1.2" stroke-dasharray="5,3"/>
  <text x="250" y="162" text-anchor="middle" font-size="10" fill="#7c3aed" font-family="monospace" font-weight="bold">EverMemOS  —  Semantic Memory Store</text>
  <rect x="50"  y="172" width="120" height="20" rx="6" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
  <text x="110" y="186" text-anchor="middle" font-size="7.5" fill="#cdd6f4" font-family="monospace">flask db error fix</text>
  <rect x="185" y="172" width="120" height="20" rx="6" fill="#1e1e2e" stroke="#7c3aed" stroke-width="1" opacity="0.8"/>
  <text x="245" y="186" text-anchor="middle" font-size="7.5" fill="#cdd6f4" font-family="monospace">deploy sequence</text>
  <rect x="320" y="172" width="120" height="20" rx="6" fill="#1e1e2e" stroke="#06b6d4" stroke-width="1" opacity="0.9"/>
  <text x="380" y="186" text-anchor="middle" font-size="7.5" fill="#06b6d4" font-family="monospace">+ new memory</text>

  <!-- Arrow from retrieval node down to EverMemOS -->
  <line x1="255" y1="110" x2="255" y2="138" stroke="#06b6d4" stroke-width="1.2" stroke-dasharray="4,2" marker-end="url(#arr)"/>
</svg>
