<svg width="760" height="240" viewBox="0 0 760 240" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="c1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a1a4e"/><stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="c2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a2a3e"/><stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="c3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a3a2e"/><stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <linearGradient id="c4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2a2a0e"/><stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="760" height="240" fill="#0d0d1a" rx="16"/>

  <!-- Card 1 -->
  <rect x="20" y="20" width="170" height="200" rx="14" fill="url(#c1)" stroke="#7c3aed" stroke-width="1.5" filter="url(#s)"/>
  <rect x="36" y="34" width="44" height="44" rx="10" fill="#7c3aed" opacity="0.2"/>
  <text x="58" y="64" text-anchor="middle" font-size="26">🔍</text>
  <text x="105" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#e0d7ff" font-family="sans-serif">Project</text>
  <text x="105" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#e0d7ff" font-family="sans-serif">Archaeology</text>
  <text x="105" y="144" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">Search your entire</text>
  <text x="105" y="158" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">project history with</text>
  <text x="105" y="172" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">natural language.</text>

  <!-- Card 2 -->
  <rect x="205" y="20" width="170" height="200" rx="14" fill="url(#c2)" stroke="#06b6d4" stroke-width="1.5" filter="url(#s)"/>
  <rect x="221" y="34" width="44" height="44" rx="10" fill="#06b6d4" opacity="0.2"/>
  <text x="243" y="64" text-anchor="middle" font-size="26">🧠</text>
  <text x="290" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#cffafe" font-family="sans-serif">Memory-Augmented</text>
  <text x="290" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#cffafe" font-family="sans-serif">Generation</text>
  <text x="290" y="144" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">Past experiences</text>
  <text x="290" y="158" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">injected into every</text>
  <text x="290" y="172" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">LLM prompt.</text>

  <!-- Card 3 -->
  <rect x="390" y="20" width="170" height="200" rx="14" fill="url(#c3)" stroke="#10b981" stroke-width="1.5" filter="url(#s)"/>
  <rect x="406" y="34" width="44" height="44" rx="10" fill="#10b981" opacity="0.2"/>
  <text x="428" y="64" text-anchor="middle" font-size="26">🔒</text>
  <text x="475" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#d1fae5" font-family="sans-serif">Privacy-Aware</text>
  <text x="475" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#d1fae5" font-family="sans-serif">Storage</text>
  <text x="475" y="144" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">Secrets auto-redacted</text>
  <text x="475" y="158" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">before anything</text>
  <text x="475" y="172" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">leaves your machine.</text>

  <!-- Card 4 -->
  <rect x="575" y="20" width="165" height="200" rx="14" fill="url(#c4)" stroke="#f59e0b" stroke-width="1.5" filter="url(#s)"/>
  <rect x="591" y="34" width="44" height="44" rx="10" fill="#f59e0b" opacity="0.2"/>
  <text x="613" y="64" text-anchor="middle" font-size="26">⚡</text>
  <text x="657" y="104" text-anchor="middle" font-size="11" font-weight="bold" fill="#fef3c7" font-family="sans-serif">Persistent</text>
  <text x="657" y="120" text-anchor="middle" font-size="11" font-weight="bold" fill="#fef3c7" font-family="sans-serif">Across Sessions</text>
  <text x="657" y="144" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">Memory survives</text>
  <text x="657" y="158" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">restarts, switches,</text>
  <text x="657" y="172" text-anchor="middle" font-size="9" fill="#9399b2" font-family="sans-serif">and reboots.</text>
